<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Repository Navigation</title>
    <!-- Font Awesome 6 (free) -->
    <!--suppress JSUnresolvedLibraryURL -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            margin: 2rem;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin: 0.5rem 0;
        }

        a {
            text-decoration: none;
            color: #0366d6;
            font-size: 1.2rem;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 图标与文字间距 */
        i {
            margin-right: 0.5rem;
            color: #586069; /* 灰色 */
        }
        h1 i {
            color: #0366d6; /* 蓝色 */
        }
    </style>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/153526791?s=400&amp;u=4ee0bbf2a7f7737f5f1503c67547d8dc1eac2a94&amp;v=4" type="image/png">
</head>
<body>
<h1><i class="fas fa-folder-open"></i> Folders in root directory</h1>
<div id="folder-list">Loading...</div>

<script>
    const owner = 'HarveyBlocks';
    const repo = 'HarveyBlocks.github.io';
    const branch = 'main';
    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents?ref=${branch}`;

    fetch(apiUrl)
        .then(async response => {
            const payload = await response.json();
            if (!response.ok) {
                const message = payload && payload.message ? payload.message : response.statusText;
                throw new Error(`GitHub API ${response.status}: ${message}`);
            }
            if (!Array.isArray(payload)) {
                throw new Error('Unexpected API response format');
            }
            return payload;
        })
        .then(items => {
            const folders = items.filter(item =>
                item.type === 'dir' &&
                !item.name.startsWith('.')
            );

            const container = document.getElementById('folder-list');
            if (folders.length === 0) {
                container.innerHTML = '<p>No folders in root directory</p>';
            } else {
                container.innerHTML = '<ul>' + folders.map(folder =>
                    `<li><a href="/${folder.name}/"><i class="fas fa-folder"></i>${folder.name}/</a></li>`
                ).join('') + '</ul>';
            }
        })
        .catch(error => {
            document.getElementById('folder-list').innerHTML = 'Failed to load: ' + error.message;
        });
</script>
</body>
</html>
