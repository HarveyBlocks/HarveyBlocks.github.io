<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Repository Navigation</title>
    <!-- Font Awesome 6 (free) -->
    <!--suppress JSUnresolvedLibraryURL -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            margin: 2rem;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin: 0.5rem 0;
        }

        a {
            text-decoration: none;
            color: #0366d6;
            font-size: 1.2rem;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 图标与文字间距 */
        i {
            margin-right: 0.5rem;
            color: #586069; /* 灰色调，柔和一些 */
        }
        h1 i {
            color: #0366d6; /* 标题图标用蓝色突出 */
        }
    </style>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/153526791?s=400&amp;u=4ee0bbf2a7f7737f5f1503c67547d8dc1eac2a94&amp;v=4" type="image/png">
</head>
<body>
<h1><i class="fas fa-folder-open"></i> Folders in root directory</h1>
<div id="folder-list">Loading...</div>

<script>
    const owner = 'HarveyBlocks';
    const repo = 'HarveyBlocks.github.io';
    const branch = 'main';
    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;

    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            // Filter folders at the root level:
            // - type 'tree' means it's a folder
            // - path contains no slash (directly under root)
            // - does not start with a dot (exclude hidden folders like .git, .github)
            const folders = data.tree.filter(item =>
                item.type === 'tree' &&
                !item.path.includes('/') &&
                !item.path.startsWith('.')
            );

            const container = document.getElementById('folder-list');
            if (folders.length === 0) {
                container.innerHTML = '<p>No folders in root directory</p>';
            } else {
                container.innerHTML = '<ul>' + folders.map(folder =>
                    `<li><a href="/${folder.path}/"><i class="fas fa-folder"></i>${folder.path}/</a></li>`
                ).join('') + '</ul>';
            }
        })
        .catch(error => {
            document.getElementById('folder-list').innerHTML = 'Failed to load: ' + error;
        });
</script>
</body>
</html>
