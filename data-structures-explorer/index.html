    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      /**
       * Asset path fixer for GitHub Pages.
       * Deferring URL restoration to React to ensure anchors (#) are handled perfectly.
       */
      (function(l) {
        // 1. Calculate project root (e.g., /personal-space/)
        var segments = l.pathname.split('/').filter(Boolean);
        var repoName = segments[0] || '';
        var repoRoot = '/' + repoName + (repoName ? '/' : '');

        // 2. Fix asset loading BEFORE anything is parsed
        // We use document.write to inject a <base> tag temporarily for ASSETS ONLY
        // then remove it immediately to avoid breaking document-relative anchors.
        document.write('<base href="' + repoRoot + '">');
        window.addEventListener('load', function() {
          var base = document.querySelector('base');
          if (base) base.parentNode.removeChild(base);
        });
      }(window.location))
    </script>
